<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}App{% endblock %}</title>
</head>
<body>
    <nav>
        <a href="{% url 'dashboard' %}">Dashboard</a> |
        <a href="{% url 'home' %}">Posts</a> |
        <a href="{% url 'profile' %}">Profile</a> |
        <a href="/admin/">Admin</a> |
        <form method="post" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit" style="background:none;border:none;color:blue;cursor:pointer;text-decoration:underline;font:inherit;padding:0;">Logout</button>
        </form>
        &mdash; Logged in as <strong>{{ user.username }}</strong>
    </nav>
    <hr>

    {% if messages %}
    {% for message in messages %}
    <p>{{ message }}</p>
    {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</body>
</html>
